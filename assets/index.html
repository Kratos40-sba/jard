<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAF Dashboard — Order Fulfillment</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/assets/style.css">
    <!-- Local Assets for Instant Load -->
    <script src="/assets/chart.min.js"></script>
    <script src="/assets/qrcode.min.js"></script>
</head>
<body>
    <!-- Animated Mesh Background -->
    <div class="bg-animation"></div>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
        <header>
            <div>
                <h1>RAF (رف) — Préparation des Commandes</h1>
                <p id="local-ip">Initialisation...</p>
            </div>
            <div id="alert-center" class="pill pill-anomaly" style="display: none; cursor: pointer;">
                ⚠️ <span id="alert-count">0</span> Alertes
            </div>
        </header>

        <main>
            <div class="pairing-card card">
                <h3>Appairage Mobile</h3>
                <div id="qrcode-container"></div>
                <p>Scannez ce code pour transformer votre smartphone en scanner haute vitesse.</p>
            </div>

            <div class="analytics-card card">
                <div class="chart-container">
                    <canvas id="velocity-chart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="worker-chart"></canvas>
                </div>
            </div>

            <div class="scan-list-card card">
                <div class="list-header">
                    <h3>Scans Synchronisés</h3>
                    <div class="header-actions">
                        <input type="file" id="csv-file-input" accept=".csv" style="display: none;">
                        <button id="import-csv-btn">Importer Produits (CSV)</button>
                        <button id="export-btn">Exporter Excel</button>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Code-barres</th>
                                <th>Produit</th>
                                <th>Quantité</th>
                                <th>Opérateur</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="scan-tbody">
                            <!-- Scans will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/assets/app.js"></script>
</body>
</html>
