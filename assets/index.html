<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jard Dashboard — The Barcode Bridge</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Jard — Audit & Inventaire</h1>
            <p id="local-ip">Initialisation...</p>
        </header>

        <main>
            <div class="pairing-card card">
                <h3>Appairage Mobile</h3>
                <div id="qrcode-container"></div>
                <p>Scannez ce code pour transformer votre smartphone en scanner haute vitesse.</p>
            </div>

            <div class="analytics-card card">
                <div class="chart-container">
                    <canvas id="velocity-chart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="worker-chart"></canvas>
                </div>
            </div>

            <div class="scan-list-card card">
                <div class="list-header">
                    <h3>Scans Synchronisés</h3>
                    <div class="header-actions">
                        <button id="import-csv-btn" class="btn-secondary">Importer CSV</button>
                        <input type="file" id="csv-file-input" accept=".csv" style="display: none;">
                        <button id="export-btn" class="btn-primary">Exporter vers Excel</button>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Code-barres</th>
                                <th>Produit</th>
                                <th>Quantité</th>
                                <th>Dernier Opérateur</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="scan-tbody">
                            <!-- Les scans apparaîtront ici -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/assets/app.js"></script>
</body>
</html>
