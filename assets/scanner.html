<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAF Picker — Preparation Pro</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="mobile-body">
    <div id="reader"></div>
    <div id="flash-overlay"></div>
    <div class="scan-region-highlight"></div>

    <div class="scanner-overlay">
        <!-- Brand Header -->
        <header class="mobile-header" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
            <div class="glass-card" style="padding: 0.8rem; border-radius: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <img src="/assets/icon.png" style="width: 32px; height: 32px; filter: brightness(1.2);">
            </div>
            <div class="glass-card" style="flex: 1; padding: 0.8rem 1.2rem; border-radius: 18px;">
                <input type="text" id="worker-name" placeholder="Nom d'Opérateur" style="margin: 0; padding: 0.2rem; font-size: 0.9rem;">
            </div>
        </header>

        <!-- Main Content Area (Dynamic) -->
        <div id="scanner-view" class="view-pane active">
            <div id="scan-result" class="glass-card scan-result-card" style="margin-bottom: 1rem;">
                <span class="product-label" style="letter-spacing: 0.1em; opacity: 0.5;">DERNIER SCAN</span>
                <div id="scanned-result" class="barcode-text" style="font-size: 2.2rem; margin: 0.8rem 0;">---</div>
                <div id="product-name" style="font-size: 0.85rem; font-weight: 800; color: #10b981; text-transform: uppercase;">Prêt à scanner</div>
            </div>

            <div class="glass-card" style="padding: 1.2rem;">
                <div style="font-size: 0.65rem; font-weight: 800; margin-bottom: 1rem; opacity: 0.4; letter-spacing: 0.05em;">HISTORIQUE RÉCENT</div>
                <div id="history-tray"></div>
            </div>
        </div>

        <div id="manual-view" class="view-pane" style="display: none;">
            <div class="glass-card" style="text-align: center;">
                <h3 style="margin-top: 0; font-weight: 800;">Saisie Manuelle</h3>
                <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 2rem;">Entrez le code manuellement si le scan échoue.</p>
                <input type="text" id="barcode-input" placeholder="Entrez le code ici..." style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 20px; color: white; font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; outline: none;">
                <button id="send-manual" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1rem; border-radius: 20px;">Envoyer au Système</button>
            </div>
        </div>

        <!-- Bottom Tabs -->
        <nav class="tab-nav">
            <button id="tab-scan" class="tab-btn active">
                <span style="font-size: 1.2rem;">📦</span>
                Préparation
            </button>
            <button id="tab-manual" class="tab-btn">
                <span style="font-size: 1.2rem;">⌨️</span>
                Manuel
            </button>
        </nav>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const workerInput = document.getElementById('worker-name');
        const resultDisplay = document.getElementById('scanned-result');
        const productDisplay = document.getElementById('product-name');
        const historyTray = document.getElementById('history-tray');
        const flashOverlay = document.getElementById('flash-overlay');

        if (!token) {
            document.body.innerHTML = "<div class='glass-card' style='margin: 2rem; text-align: center;'><h1>Erreur</h1><p>Token manquant. Veuillez rescanner le QR code.</p></div>";
        }

        // Tab Switching Logic
        document.getElementById('tab-scan').onclick = () => {
            document.getElementById('scanner-view').style.display = 'block';
            document.getElementById('manual-view').style.display = 'none';
            document.getElementById('tab-scan').classList.add('active');
            document.getElementById('tab-manual').classList.remove('active');
        };
        document.getElementById('tab-manual').onclick = () => {
            document.getElementById('scanner-view').style.display = 'none';
            document.getElementById('manual-view').style.display = 'block';
            document.getElementById('tab-scan').classList.remove('active');
            document.getElementById('tab-manual').classList.add('active');
            document.getElementById('barcode-input').focus();
        };

        function flash() {
            flashOverlay.classList.add('flash-active');
            setTimeout(() => flashOverlay.classList.remove('flash-active'), 100);
        }

        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function addToHistory(barcode) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.style.background = 'rgba(255,255,255,0.05)';
            item.innerHTML = `<span style='font-weight:700'>${barcode}</span><span style="opacity:0.4; font-size:0.7rem;">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
            historyTray.prepend(item);
            if (historyTray.children.length > 3) historyTray.lastElementChild.remove();
        }

        function onScanSuccess(decodedText) {
            if (decodedText === resultDisplay.innerText) return;
            
            const worker = workerInput.value || "Scanner Mobile";
            resultDisplay.innerText = decodedText;
            
            // Visual & Audio Feedback
            flash();
            playBeep();
            if (navigator.vibrate) navigator.vibrate([100]);
            addToHistory(decodedText);
            
            const resultCard = document.getElementById('scan-result');
            resultCard.classList.add('success-glow');
            setTimeout(() => resultCard.classList.remove('success-glow'), 600);

            fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Jard-Token': token },
                body: JSON.stringify({ barcode: decodedText, worker: worker })
            }).then(response => {
                if (response.ok) productDisplay.innerText = "SYNCHRONISÉ ✓";
                else productDisplay.innerText = "ERREUR TRANSMISSION";
            });
        }

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 250 }, aspectRatio: window.innerHeight / window.innerWidth };
        
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                console.error(err);
                productDisplay.innerHTML = "<span style='color:#f43f5e'>ERREUR CAMERA</span>";
            });

        document.getElementById('send-manual').onclick = () => {
            const val = document.getElementById('barcode-input').value;
            if (val) {
                onScanSuccess(val);
                document.getElementById('barcode-input').value = '';
                // Switch back after manual entry
                setTimeout(() => document.getElementById('tab-scan').click(), 500);
            }
        };
    </script>
</body>
</html>
