<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAF Picker (رف) — Préparation Pro</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="mobile-body">
    <div id="reader"></div>
    <div id="flash-overlay"></div>
    <div class="scan-region-highlight"></div>

    <div class="scanner-overlay">
        <!-- Brand Header -->
        <header class="mobile-header" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
            <div class="glass-card" style="padding: 0.8rem; border-radius: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <img src="/assets/icon.png" style="width: 32px; height: 32px;">
            </div>
            <div class="glass-card" style="flex: 1; padding: 0.8rem 1.2rem; border-radius: 18px;">
                <input type="text" id="worker-name" placeholder="Nom d'Opérateur" style="margin: 0; padding: 0.2rem; font-size: 0.9rem;">
            </div>
        </header>

        <!-- Main Content Area -->
        <div id="checklist-view" class="view-pane active">
            <div id="order-status" class="glass-card" style="margin-bottom: 1rem; border-radius: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span id="order-id-label" style="font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em;">ORDRE: ---</span>
                    <span id="progress-pill" class="pill pill-active">0/0</span>
                </div>
            </div>

            <div id="scan-feedback" class="glass-card" style="margin-bottom: 1rem; text-align: center; display: none;">
                <h2 id="feedback-msg" style="margin: 0; font-size: 1.4rem;">---</h2>
            </div>

            <div class="glass-card" style="padding: 1.2rem; max-height: 40vh; overflow-y: auto;">
                <div style="font-size: 0.65rem; font-weight: 800; margin-bottom: 1rem; opacity: 0.4; letter-spacing: 0.05em;">LISTE DE PRÉPARATION</div>
                <div id="checklist-items" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <!-- Items injected here -->
                </div>
            </div>
        </div>

        <div id="manual-view" class="view-pane" style="display: none;">
            <div class="glass-card" style="text-align: center;">
                <h3 style="margin-top: 0; font-weight: 800;">Saisie Manuelle</h3>
                <input type="text" id="barcode-input" placeholder="Entrez le code ici..." style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 20px; color: white; font-size: 1.5rem; text-align: center; outline: none;">
                <button id="send-manual" class="btn btn-primary" style="width: 100%; padding: 1.2rem; margin-top: 1rem; border-radius: 20px;">Valider</button>
            </div>
        </div>

        <!-- Bottom Tabs -->
        <nav class="tab-nav">
            <button id="tab-scan" class="tab-btn active"><span>📦</span> Préparation</button>
            <button id="tab-manual" class="tab-btn"><span>⌨️</span> Manuel</button>
        </nav>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const orderId = urlParams.get('order_id');
        const workerInput = document.getElementById('worker-name');
        const checklistContainer = document.getElementById('checklist-items');
        const feedbackCard = document.getElementById('scan-feedback');
        const feedbackMsg = document.getElementById('feedback-msg');
        const flashOverlay = document.getElementById('flash-overlay');

        let currentOrder = null;

        async function fetchOrder() {
            if (!orderId) return;
            const resp = await fetch('/api/orders', { headers: { 'X-Jard-Token': token } });
            const orders = await resp.json();
            currentOrder = orders.find(o => o.id === orderId);
            renderChecklist();
        }

        function renderChecklist() {
            if (!currentOrder) return;
            document.getElementById('order-id-label').innerText = `ORDRE: ${currentOrder.id}`;
            const total = currentOrder.items.reduce((acc, i) => acc + i.target_qty, 0);
            const packed = currentOrder.items.reduce((acc, i) => acc + i.packed_qty, 0);
            document.getElementById('progress-pill').innerText = `${packed}/${total}`;

            checklistContainer.innerHTML = '';
            currentOrder.items.forEach(item => {
                const div = document.createElement('div');
                div.className = `history-item ${item.packed_qty >= item.target_qty ? 'success-glow' : ''}`;
                div.style.opacity = item.packed_qty >= item.target_qty ? '0.4' : '1';
                div.innerHTML = `
                    <div style="flex:1">
                        <div style="font-weight:800; font-size: 0.9rem;">${item.name}</div>
                        <div style="font-size:0.7rem; opacity:0.5;">${item.barcode}</div>
                    </div>
                    <div class="pill ${item.packed_qty >= item.target_qty ? 'pill-success' : 'pill-active'}" style="min-width: 40px; text-align: center;">
                        ${item.packed_qty} / ${item.target_qty}
                    </div>
                `;
                checklistContainer.appendChild(div);
            });
        }

        function triggerError() {
            flashOverlay.style.background = 'rgba(239, 68, 68, 0.8)';
            flashOverlay.classList.add('flash-active');
            // "Violent" vibration: SOS pattern or long pulse
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
            
            feedbackCard.style.display = 'block';
            feedbackCard.style.background = 'rgba(239, 68, 68, 0.4)';
            feedbackCard.style.border = '2px solid #ef4444';
            feedbackMsg.innerHTML = "<span style='font-size: 1.8rem; font-weight: 900;'>❌ ERREUR ARTICLE</span><br><small>Ce n'est pas le bon produit !</small>";
            
            setTimeout(() => {
                flashOverlay.classList.remove('flash-active');
                flashOverlay.style.background = 'white';
                feedbackCard.style.display = 'none';
            }, 2000);
        }

        function triggerSuccess(msg) {
            flashOverlay.style.background = 'rgba(16, 185, 129, 0.4)';
            flashOverlay.classList.add('flash-active');
            if (navigator.vibrate) navigator.vibrate([50]);
            feedbackCard.style.display = 'block';
            feedbackCard.style.background = 'rgba(16, 185, 129, 0.2)';
            feedbackMsg.innerText = msg + " ✓";
            setTimeout(() => {
                flashOverlay.classList.remove('flash-active');
                flashOverlay.style.background = 'white';
                feedbackCard.style.display = 'none';
            }, 800);
        }

        function onScanSuccess(barcode) {
            const worker = workerInput.value || "Livreur";
            fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Jard-Token': token },
                body: JSON.stringify({ barcode, worker, order_id: orderId })
            }).then(async resp => {
                const data = await resp.json();
                if (resp.ok) {
                    triggerSuccess(data.message);
                    fetchOrder();
                } else {
                    triggerError();
                }
            });
        }

        // Standard Qr Setup
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

        // Tabs
        document.getElementById('tab-scan').onclick = () => {
            document.getElementById('checklist-view').style.display = 'block';
            document.getElementById('manual-view').style.display = 'none';
        }
        document.getElementById('tab-manual').onclick = () => {
            document.getElementById('checklist-view').style.display = 'none';
            document.getElementById('manual-view').style.display = 'block';
        }

        document.getElementById('send-manual').onclick = () => {
            const val = document.getElementById('barcode-input').value;
            if (val) { onScanSuccess(val); document.getElementById('barcode-input').value = ''; }
        };

        if (orderId) fetchOrder();
    </script>
</body>
</html>
