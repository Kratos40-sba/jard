<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jard Scanner</title>
    <link rel="stylesheet" href="/assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="mobile-body">
    <div class="mobile-container">
        <header>
            <h1>Scanner Jard</h1>
            <input type="text" id="worker-name" placeholder="Votre nom (ex: Phone 1)">
        </header>

        <div id="reader"></div>

        <div class="last-scan">
            <h3>Dernier Scan:</h3>
            <p id="scanned-result">Prêt à scanner...</p>
        </div>

        <div class="manual-input">
            <input type="text" id="barcode-input" placeholder="Saisie manuelle...">
            <button id="send-manual" class="btn-secondary">Envoyer</button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const workerInput = document.getElementById('worker-name');
        const resultDisplay = document.getElementById('scanned-result');

        if (!token) {
            document.body.innerHTML = "<h1>Erreur</h1><p>Token de sécurité manquant. Veuillez rescanner le QR code.</p>";
        }

        // Play a short beep sound using Web Audio API
        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function onScanSuccess(decodedText) {
            const worker = workerInput.value || "Anonyme";
            resultDisplay.innerText = decodedText;
            
            // Provide immediate feedback
            playBeep();
            if (navigator.vibrate) navigator.vibrate(200);

            fetch('/api/scan', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Jard-Token': token
                },
                body: JSON.stringify({ barcode: decodedText, worker: worker })
            }).then(response => {
                if (response.status === 401) alert("Session expirée ou Token invalide");
                else if (!response.ok) alert("Erreur d'envoi: " + response.status);
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess);

        document.getElementById('send-manual').onclick = () => {
            const val = document.getElementById('barcode-input').value;
            if (val) {
                onScanSuccess(val);
                document.getElementById('barcode-input').value = '';
            }
        };
    </script>
</body>
</html>
