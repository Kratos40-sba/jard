name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: jard-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: jard-windows.exe

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: target/${{ matrix.platform.target }}/release/${{ matrix.platform.name == 'jard-windows.exe' && 'jard.exe' || 'jard' }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/jard-linux/jard
            artifacts/jard-windows.exe/jard.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
